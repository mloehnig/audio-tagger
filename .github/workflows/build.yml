name: Build
on: [push, pull_request]
permissions:
  contents: read

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Rust Cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y lld autogen libasound2-dev pkg-config make libssl-dev gcc g++

    - name: Build
      run: cargo build --release -p onetagger-cli

    - name: Bundle
      run: |
        mkdir dist
        tar zcf dist/OneTagger-linux-cli.tar.gz -C target/release onetagger-cli

    - name: Upload Linux CLI
      uses: actions/upload-artifact@v4
      with:
        name: onetagger-linux-cli
        path: dist/OneTagger-linux-cli.tar.gz


  build-win:
    name: Windows
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Rust Cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install Dependencies
      run: rustup update

    - name: Build
      run: cargo build --release -p onetagger-cli

    - name: Bundle
      run: |
        mkdir dist
        copy target\release\onetagger-cli.exe dist\OneTagger-windows-cli.exe

    - name: Upload Windows CLI
      uses: actions/upload-artifact@v4
      with:
        name: onetagger-win-cli
        path: dist/OneTagger-windows-cli.exe


  build-mac:
    name: Mac
    runs-on: macos-13

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Rust Cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        brew install rustup
        rustup install stable

    - name: Build
      run: cargo build --release -p onetagger-cli

    - name: Bundle
      run: |
        mkdir dist
        cd target/release
        chmod +x onetagger-cli
        zip ../../dist/OneTagger-mac-cli.zip onetagger-cli

    - name: Upload Mac CLI
      uses: actions/upload-artifact@v4
      with:
        name: onetagger-mac-cli
        path: dist/OneTagger-mac-cli.zip
